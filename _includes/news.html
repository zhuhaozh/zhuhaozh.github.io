<div class="news">

  <h2>News</h2>
    {% if site.news  %}
    {% assign news = site.news | reverse %}
    {% for item in news limit: site.news_limit %}
    <pre>//{{ item.date | date: "%b %-d, %Y" }}: {{ item.title }} </pre>
    {% endfor %}
    {% else %}
    <p>No news so far...</p>
    {% endif %}

</div>
